<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>My Home</title>
    <meta name="description" content="This is my HTML5 boilerplate.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/home.css">
</head>

<body class="c-body js-home">
    <header class="c-header">
        <div class="c-header__nav-container">
            <h1 class="c-header__logo">PowerLink</h1>
            <img class="c-list__image" src="img/svg/list.svg" alt="List logo">
        </div>
    </header>
    <main class="c-main">
        <section class="c-home-battery">
            <h2 class="c-article__title">Home Battery</h2>
            <div class="c-home-battery__components">
                <article class="c-article__battery">
                    <div class="c-battery">
                        <p class="c-battery__level">85%</p>
                        <div class="c-battery__meta">
                            <p class="c-battery__status">Battery status</p>
                            <p class="c-battery__capacity">Active</p>
                        </div>
                    </div>
                </article>
                <article class="c-usages">
                    <div class="c-usage">
                        <img class="c-usage__icon" src="img/svg/lightning.svg" alt="Usage icon">
                        <div class="c-usage__meta">
                            <p class="c-usage__title">Today's Usage</p>
                            <p class="c-usage__value">12.5 kWh</p>
                        </div>
                    </div>
                    <div class="c-usage">
                        <img class="c-usage__icon" src="img/svg/lightning.svg" alt="Usage icon">
                        <div class="c-usage__meta">
                            <p class="c-usage__title">This Week's Usage</p>
                            <p class="c-usage__value">240 kWh</p>
                        </div>
                    </div>
                </article>
            </div>
        </section>
    </main>
    <footer class="c-footer">
    </footer>
</body>

</html>
