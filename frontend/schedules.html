<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>My Home</title>
    <meta name="description" content="This is my HTML5 boilerplate.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/schedules.css">
    <script src="script/schedules.js" defer></script>
</head>

<body class="c-body js-home">
    <header class="c-header">
        <div class="c-header__nav-container">
            <a href="index.html" class="c-header__logo c-hover-underline">PowerLink</a>
            <svg class="c-list__svg c-hamburger" xmlns="http://www.w3.org/2000/svg" width="32" height="32"
                fill="#000000" viewBox="0 0 256 256" aria-expanded="false" id="hamburgerBtn">
                <path
                    d="M224,128a8,8,0,0,1-8,8H40a8,8,0,0,1,0-16H216A8,8,0,0,1,224,128ZM40,72H216a8,8,0,0,0,0-16H40a8,8,0,0,0,0,16ZM216,184H40a8,8,0,0,0,0,16H216a8,8,0,0,0,0-16Z">
                </path>
            </svg>
            <nav class="c-nav-popup" aria-hidden="false">
                <svg class="c-nav-popup__close" xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000"
                    viewBox="0 0 256 256" id="closeBtn">
                    <path
                        d="M205.66,194.34a8,8,0,0,1-11.32,11.32L128,139.31,61.66,205.66a8,8,0,0,1-11.32-11.32L116.69,128,50.34,61.66A8,8,0,0,1,61.66,50.34L128,116.69l66.34-66.35a8,8,0,0,1,11.32,11.32L139.31,128Z">
                    </path>
                </svg>
                <ul class="c-nav-popup__list">
                    <li class="c-nav-popup__item"><a href="home.html" class="c-nav-popup__link">My Home</a></li>
                    <li class="c-nav-popup__item"><a href="insights.html" class="c-nav-popup__link">Insights</a>
                    </li>
                </ul>
            </nav>
        </div>
        <div class="c-overlay" aria-hidden="true" id="overlay"></div>
    </header>


    <main class="c-main">
        <div class="c-lighting-outside__container">
            <section class="c-lighting-outside__wrapper">
                <div class="c-lighting-card c-hover--shadow c-white-background">
                    <div class="c-lighting-card__content">
                        <div class="c-bulb-icon" id="bulbIconLower">
                            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256">
                                <path
                                    d="M176,232a8,8,0,0,1-8,8H88a8,8,0,0,1,0-16h80A8,8,0,0,1,176,232Zm40-128a87.55,87.55,0,0,1-33.64,69.21A16.24,16.24,0,0,0,176,186v6a16,16,0,0,1-16,16H96a16,16,0,0,1-16-16v-6a16,16,0,0,0-6.23-12.66A87.59,87.59,0,0,1,40,104.49C39.74,56.83,78.26,17.14,125.88,16A88,88,0,0,1,216,104Zm-16,0a72,72,0,0,0-73.74-72c-39,.92-70.47,33.39-70.26,72.39a71.65,71.65,0,0,0,27.64,56.3A32,32,0,0,1,96,186v6h64v-6a32.15,32.15,0,0,1,12.47-25.35A71.65,71.65,0,0,0,200,104Zm-16.11-9.34a57.6,57.6,0,0,0-46.56-46.55,8,8,0,0,0-2.66,15.78c16.57,2.79,30.63,16.85,33.44,33.45A8,8,0,0,0,176,104a9,9,0,0,0,1.35-.11A8,8,0,0,0,183.89,94.66Z">
                                </path>
                            </svg>
                        </div class="c-hover--shadow">
                        <input type="range" min="0" max="100" value="0" class="c-slider" id="lightSliderLower">
                        <div class="c-value-display" id="valueDisplayLower">0%</div>
                    </div>
                    <div class="c-lighting-card__meta">
                        <div class="c-lighting-card__info">
                            <p class="c-lighting-card__status">Lighting</p>
                            <p class="c-lighting-card__state">Schedule inactive</p>
                        </div>
                        <a href="schedules.html" class="c-lighting-card__edit c-edit">Edit Schedule</a>
                    </div>
                </div>
            </section>
        </div>

        <div class="c-downstairs__container">
            <section class="c-lower lighting-lower">
                <h2 class="c-section__title">Living room & Kitchen Climate Schedule</h2>
                <div class="c-lower-card__container">
                    <div class="c-temperature-control c-hover--shadow">
                        <div class="c-circular-progress">
                            <div class="c-progress-ring" id="progressRing"></div>
                            <div class="c-temperature-display" id="tempDisplay">
                                <span id="tempValue">24</span><span class="unit">°C</span>
                            </div>
                        </div>
                        <div class="c-controls">
                            <svg class="c-control-btn" id="decreaseBtn" xmlns="http://www.w3.org/2000/svg" width="32"
                                height="32" fill="#000000" viewBox="0 0 256 256">
                                <path d="M224,128a8,8,0,0,1-8,8H40a8,8,0,0,1,0-16H216A8,8,0,0,1,224,128Z"></path>
                            </svg>
                            <svg class="c-control-btn" id="increaseBtn" xmlns="http://www.w3.org/2000/svg" width="32"
                                height="32" fill="#000000" viewBox="0 0 256 256">
                                <path
                                    d="M224,128a8,8,0,0,1-8,8H136v80a8,8,0,0,1-16,0V136H40a8,8,0,0,1,0-16h80V40a8,8,0,0,1,16,0v80h80A8,8,0,0,1,224,128Z">
                                </path>
                            </svg>
                        </div>
                        <div class="c-temperature-card__meta">
                            <div class="c-temperature-card__info">
                                <p class="c-temperature-card__status">Climate Control</p>
                                <p class="c-temperature-card__state">Schedule inactive</p>
                            </div>
                            <a href="schedules.html" class="c-temperature-card__edit c-edit">Edit Schedule</a>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <div class="c-upstairs__container">
            <section class="c-upper lighting-upper">
                <h3 class="c-section__title">Bedroom and Bathroom</h3>
                <div class="c-lighting-card c-hover--shadow">
                    <div class="c-lighting-card__content">
                        <div class="c-bulb-icon" id="bulbIconUpper">
                            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000"
                                viewBox="0 0 256 256">
                                <path
                                    d="M176,232a8,8,0,0,1-8,8H88a8,8,0,0,1,0-16h80A8,8,0,0,1,176,232Zm40-128a87.55,87.55,0,0,1-33.64,69.21A16.24,16.24,0,0,0,176,186v6a16,16,0,0,1-16,16H96a16,16,0,0,1-16-16v-6a16,16,0,0,0-6.23-12.66A87.59,87.59,0,0,1,40,104.49C39.74,56.83,78.26,17.14,125.88,16A88,88,0,0,1,216,104Zm-16,0a72,72,0,0,0-73.74-72c-39,.92-70.47,33.39-70.26,72.39a71.65,71.65,0,0,0,27.64,56.3A32,32,0,0,1,96,186v6h64v-6a32.15,32.15,0,0,1,12.47-25.35A71.65,71.65,0,0,0,200,104Zm-16.11-9.34a57.6,57.6,0,0,0-46.56-46.55,8,8,0,0,0-2.66,15.78c16.57,2.79,30.63,16.85,33.44,33.45A8,8,0,0,0,176,104a9,9,0,0,0,1.35-.11A8,8,0,0,0,183.89,94.66Z">
                                </path>
                            </svg>
                        </div>
                        <input type="range" min="0" max="100" value="0" class="c-slider" id="lightSliderUpper">
                        <div class="c-value-display" id="valueDisplayUpper">0%</div>
                    </div>
                    <div class="c-lighting-card__meta">
                        <div class="c-lighting-card__info">
                            <p class="c-lighting-card__status">Lighting</p>
                            <p class="c-lighting-card__state c-active">Schedule active</p>
                        </div>
                        <a href="schedules.html" class="c-lighting-card__edit c-edit">Edit Schedule</a>
                    </div>
                </div>
            </section>
        </div>
    <footer class="c-footer">
    </footer>
</body>

</html>
